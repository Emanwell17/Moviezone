services:
  # ============================================================
  # 1) BACKEND — Node.js API (FREE)
  # ============================================================
  - type: web
    name: moviezone-api
    runtime: node
    rootDir: moviebox-api1-main
    plan: free
    buildCommand: npm install
    startCommand: node index.js

    envVars:
      - key: NODE_ENV
        value: production

      - key: JWT_SECRET
        generateValue: true

      - key: MONGO_URI
        sync: false
        # Add your MongoDB connection string in Render dashboard
        # Example: mongodb+srv://username:password@cluster.mongodb.net/moviezone


  # ============================================================
  # 2) FRONTEND — Vite React App (SERVE AS WEB)
  # ============================================================
  - type: web
    name: moviezone-frontend
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node server.js

    envVars:
      - key: VITE_API_URL
        value: https://moviezone-api.onrender.com/api
      - key: VITE_PAYSTACK_KEY
        value: pk_live_REPLACE_WITH_YOUR_KEY